<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KAI - Multimodal AI Counseling</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 헤더 영역 */
        header {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

            header h1 {
                margin: 0;
                font-size: 1.5rem;
                color: #ffffff;
            }

            header p {
                margin: 5px 0 0;
                color: #888;
                font-size: 0.9rem;
            }

        /* 채팅창 영역 */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 70%;
            line-height: 1.5;
        }

        .ai-message {
            background-color: #2d2d2d;
            align-self: flex-start;
        }

        .user-message {
            background-color: #3b5bdb;
            align-self: flex-end;
            color: white;
        }

        /* 입력 영역 */
        #input-area {
            padding: 20px;
            background: #222;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            background: #333;
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px;
            resize: none;
        }

        button {
            background: #3b5bdb;
            border: none;
            border-radius: 8px;
            color: white;
            padding: 0 20px;
            cursor: pointer;
            transition: 0.3s;
        }

            button:hover {
                background: #2841b5;
            }
    </style>
</head>
<body>
    <header>
        <h1>KAI</h1>
        <p>Multimodal AI Mental Counseling Platform</p>
    </header>

    <div id="chat-log">
        <div class="message ai-message">안녕하세요! 저는 KAI입니다. 오늘 기분은 어떠신가요?</div>
    </div>

    <div id="input-area">
        <textarea id="chat-input" rows="2" placeholder="메시지를 입력하세요... (Enter: 전송)"></textarea>
        <button onclick="sendToAI()">전송</button>
    </div>

    <script>
        let keyCount = 0;
        let startTime = Date.now();
        const input = document.getElementById('chat-input');

        input.addEventListener('keydown', (e) => {
        keyCount++;
        if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendToAI();
        }
        });

        async function sendToAI() {
        const text = input.value.trim();
        if (!text) return;

        // UI에 사용자 메시지 추가
        const chatLog = document.getElementById('chat-log');
        chatLog.innerHTML += `<div class="message user-message">${text}</div>`;
        input.value = '';

        const duration = (Date.now() - startTime) / 1000;
        const speed = keyCount / (duration || 1);

        const res = await fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text: text, speed: speed })
        });
        const data = await res.json();

        chatLog.innerHTML += `<div class="message ai-message">${data.reply}</div>`;
        chatLog.scrollTop = chatLog.scrollHeight;

        keyCount = 0; startTime = Date.now();
        }
    </script>
</body>
</html>
